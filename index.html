<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Decision Tree Coverage Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    #picker-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }

    #picker-screen h1 {
      font-size: 1.3rem;
      font-weight: 500;
      color: #fff;
    }

    #file-list {
      background: #252525;
      border: 1px solid #383838;
      border-radius: 8px;
      min-width: 320px;
      overflow: hidden;
    }

    .file-item {
      padding: 11px 18px;
      cursor: pointer;
      border-bottom: 1px solid #333;
      font-size: 0.88rem;
      font-family: monospace;
      color: #ccc;
      transition: background 0.1s;
    }
    .file-item:last-child { border-bottom: none; }
    .file-item:hover { background: #2d2d2d; color: #fff; }

    #no-files { color: #666; font-size: 0.88rem; }

    #graph-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      background: #212121;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .btn {
      padding: 5px 12px;
      background: #2c2c2c;
      border: 1px solid #444;
      border-radius: 4px;
      color: #d0d0d0;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.1s;
    }
    .btn:hover { background: #383838; }

    #current-file {
      font-size: 0.82rem;
      font-family: monospace;
      color: #777;
    }

    #coverage-panel {
      margin-left: auto;
      font-size: 0.8rem;
      color: #999;
      background: #252525;
      border: 1px solid #383838;
      border-radius: 4px;
      padding: 4px 10px;
    }

    #svg-container { flex: 1; overflow: hidden; }

    #graph-svg { width: 100%; height: 100%; display: block; }

    #tooltip {
      position: fixed;
      background: #242424;
      border: 1px solid #484848;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.77rem;
      max-width: 300px;
      pointer-events: none;
      display: none;
      z-index: 1000;
      line-height: 1.6;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    .tt-title { font-weight: 600; color: #fff; margin-bottom: 4px; font-size: 0.8rem; }
    .tt-text { color: #bbb; }
    .tt-action { color: #bbb; padding-left: 10px; position: relative; }
    .tt-action::before { content: '–'; position: absolute; left: 0; color: #555; }
    .tt-covered { margin-top: 7px; font-weight: 500; }
    .tt-yes { color: #4caf50; }
    .tt-no { color: #e57373; }
  </style>
</head>
<body>

<div id="picker-screen">
  <h1>Decision Tree Coverage Tracker</h1>
  <div id="no-files" style="display:none">No JSON files found in current directory.</div>
  <div id="file-list"></div>
</div>

<div id="graph-screen">
  <div id="toolbar">
    <button class="btn" id="btn-back">← Files</button>
    <span id="current-file"></span>
    <button class="btn" id="btn-refresh">Refresh</button>
    <div id="coverage-panel">—</div>
  </div>
  <div id="svg-container">
    <svg id="graph-svg"></svg>
  </div>
</div>

<div id="tooltip"></div>

<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script>
let currentFile = null;
let zoomBehavior = null;

function showPicker() {
  document.getElementById('picker-screen').style.display = 'flex';
  document.getElementById('graph-screen').style.display = 'none';
}

function showGraph() {
  document.getElementById('picker-screen').style.display = 'none';
  document.getElementById('graph-screen').style.display = 'flex';
}

async function loadFileList() {
  try {
    const resp = await fetch('/files');
    const files = await resp.json();
    const list = document.getElementById('file-list');
    const none = document.getElementById('no-files');

    list.innerHTML = '';
    if (files.length === 0) {
      list.style.display = 'none';
      none.style.display = 'block';
      return;
    }

    list.style.display = 'block';
    none.style.display = 'none';
    files.forEach(f => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.textContent = f;
      item.addEventListener('click', () => openFile(f));
      list.appendChild(item);
    });
  } catch (e) {
    console.error('Failed to fetch file list', e);
  }
}

async function openFile(filename) {
  currentFile = filename;
  document.getElementById('current-file').textContent = filename;
  await refreshGraph();
  showGraph();
}

async function refreshGraph() {
  if (!currentFile) return;
  try {
    const resp = await fetch('/' + currentFile + '?_=' + Date.now());
    const nodes = await resp.json();
    renderGraph(nodes);
  } catch (e) {
    console.error('Failed to load tree', e);
  }
}

function getNodeSize(node) {
  if (node.type === 'decision') {
    return { width: 240, height: 90 };
  }
  const h = 38 + (node.actions ? node.actions.length * 20 : 0);
  return { width: 220, height: Math.max(50, h) };
}

function buildLayout(nodes) {
  const g = new dagre.graphlib.Graph();
  g.setGraph({ rankdir: 'TB', nodesep: 70, ranksep: 90, marginx: 30, marginy: 30 });
  g.setDefaultEdgeLabel(() => ({}));

  nodes.forEach(node => {
    const { width, height } = getNodeSize(node);
    g.setNode(node.id, { width, height });
  });

  nodes.forEach(node => {
    if (node.type === 'decision' && node.branches) {
      node.branches.forEach(b => {
        if (b.next) g.setEdge(node.id, b.next, { label: b.label });
      });
    } else if (node.next) {
      g.setEdge(node.id, node.next, { label: '' });
    }
  });

  dagre.layout(g);
  return g;
}

function truncate(str, max) {
  if (!str) return '';
  return str.length > max ? str.slice(0, max).trimEnd() + '…' : str;
}

function wrapWords(text, maxChars) {
  const words = (text || '').split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const candidate = line ? line + ' ' + word : word;
    if (candidate.length <= maxChars) {
      line = candidate;
    } else {
      if (line) lines.push(line);
      line = word.length > maxChars ? word.slice(0, maxChars) + '…' : word;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function renderGraph(nodes) {
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
  const layout = buildLayout(nodes);

  const total = nodes.length;
  const covered = nodes.filter(n => n.covered).length;
  const pct = total > 0 ? Math.round(covered / total * 100) : 0;
  document.getElementById('coverage-panel').textContent =
    `${covered} / ${total} covered (${pct}%)`;

  const svgEl = document.getElementById('graph-svg');
  const svg = d3.select(svgEl);
  svg.selectAll('*').remove();

  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '0 0 10 10')
    .attr('refX', 9)
    .attr('refY', 5)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,0 L10,5 L0,10 z')
    .attr('fill', '#555');

  const root = svg.append('g');

  const edgeLayer = root.append('g');
  layout.edges().forEach(e => {
    const edgeData = layout.edge(e);
    const pts = edgeData.points;

    const pathPts = [pts[0], ...pts, pts[pts.length - 1]];
    const lineGen = d3.line().x(d => d.x).y(d => d.y).curve(d3.curveBasis);

    edgeLayer.append('path')
      .attr('d', lineGen(pathPts))
      .attr('fill', 'none')
      .attr('stroke', '#4a4a4a')
      .attr('stroke-width', 1.5)
      .attr('marker-end', 'url(#arrowhead)');

    if (edgeData.label) {
      const mid = pts[Math.floor(pts.length / 2)];
      edgeLayer.append('text')
        .attr('x', mid.x)
        .attr('y', mid.y - 5)
        .attr('text-anchor', 'middle')
        .attr('fill', '#777')
        .attr('font-size', '10px')
        .text(truncate(edgeData.label, 24));
    }
  });

  const nodeLayer = root.append('g');
  const tooltip = document.getElementById('tooltip');

  layout.nodes().forEach(nodeId => {
    const lNode = layout.node(nodeId);
    const node = nodeMap[nodeId];
    if (!node || !lNode) return;

    const { x, y, width, height } = lNode;
    const fill = node.covered ? '#2d5a2d' : '#5a2d2d';
    const stroke = node.covered ? '#4caf50' : '#e57373';

    const g = nodeLayer.append('g')
      .attr('transform', `translate(${x},${y})`)
      .style('cursor', 'pointer');

    if (node.type === 'decision') {
      const hw = width / 2;
      const hh = height / 2;
      g.append('polygon')
        .attr('points', `0,${-hh} ${hw},0 0,${hh} ${-hw},0`)
        .attr('fill', fill)
        .attr('stroke', stroke)
        .attr('stroke-width', 2);

      const lines = wrapWords(node.question || node.id, 24).slice(0, 4);
      const lineH = 14;
      const blockH = lines.length * lineH;
      lines.forEach((line, i) => {
        g.append('text')
          .attr('x', 0)
          .attr('y', -blockH / 2 + i * lineH + lineH * 0.72)
          .attr('text-anchor', 'middle')
          .attr('fill', '#fff')
          .attr('font-size', '10px')
          .text(line);
      });
    } else {
      g.append('rect')
        .attr('x', -width / 2)
        .attr('y', -height / 2)
        .attr('width', width)
        .attr('height', height)
        .attr('rx', 4)
        .attr('fill', fill)
        .attr('stroke', stroke)
        .attr('stroke-width', 2);

      g.append('text')
        .attr('x', 0)
        .attr('y', -height / 2 + 14)
        .attr('text-anchor', 'middle')
        .attr('fill', '#fff')
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .text(truncate(node.id, 28));

      (node.actions || []).forEach((action, i) => {
        g.append('text')
          .attr('x', -width / 2 + 10)
          .attr('y', -height / 2 + 30 + i * 20)
          .attr('fill', '#ccc')
          .attr('font-size', '9.5px')
          .text('– ' + truncate(action, 28));
      });
    }

    g.on('mouseover', (event) => {
      let html = `<div class="tt-title">${node.id}</div>`;
      if (node.type === 'decision') {
        html += `<div class="tt-text">${node.question || ''}</div>`;
      } else {
        (node.actions || []).forEach(a => {
          html += `<div class="tt-action">${a}</div>`;
        });
      }
      const cls = node.covered ? 'tt-yes' : 'tt-no';
      html += `<div class="tt-covered ${cls}">Covered: ${node.covered ? 'Yes' : 'No'}</div>`;
      tooltip.innerHTML = html;
      tooltip.style.display = 'block';
      tooltip.style.left = (event.clientX + 14) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
    }).on('mousemove', (event) => {
      tooltip.style.left = (event.clientX + 14) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
    }).on('mouseout', () => {
      tooltip.style.display = 'none';
    });
  });

  zoomBehavior = d3.zoom().scaleExtent([0.05, 4]).on('zoom', e => {
    root.attr('transform', e.transform);
  });
  svg.call(zoomBehavior);

  requestAnimationFrame(() => {
    const bbox = root.node().getBBox();
    const svgW = svgEl.clientWidth;
    const svgH = svgEl.clientHeight;
    if (!bbox.width || !bbox.height) return;
    const pad = 50;
    const scale = Math.min(
      (svgW - pad * 2) / bbox.width,
      (svgH - pad * 2) / bbox.height,
      1
    );
    const tx = (svgW - bbox.width * scale) / 2 - bbox.x * scale;
    const ty = (svgH - bbox.height * scale) / 2 - bbox.y * scale;
    svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  });
}

document.getElementById('btn-back').addEventListener('click', () => {
  showPicker();
  loadFileList();
});

document.getElementById('btn-refresh').addEventListener('click', refreshGraph);

loadFileList();
</script>
</body>
</html>
